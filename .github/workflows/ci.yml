name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r air_pollution/requirements.txt
        pip install pytest pytest-django flake8
    - name: Lint with flake8
      run: |
        flake8 air_pollution --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Run Tests
      working-directory: air_pollution
      env:
        DJANGO_SETTINGS_MODULE: air_pollution.settings
        REDIS_URL: redis://redis:6379/1
        CELERY_BROKER_URL: redis://redis:6379/0
      run: |
        python manage.py test air_pollution_be
