  be-air-pollution:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: air_pollution_management_be
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      mysql-air-pollution-db:
        condition: service_healthy
      redis_air_pollution:
        condition: service_healthy
      # kafka_air_pollution:
      #   condition: service_healthy
    networks:
      - air-pollution-network
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    env_file:
    - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_air_pollution:
    build:
      context: .
      dockerfile: dockerfile.celery
    container_name: celery_air_pollution
    volumes:
      - .:/app
      - ./.env:/app/.env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL_DEV}
      # KAFKA_BROKER: kafka_air_pollution:9092
      PYTHONUNBUFFERED: 1
    depends_on:
      - redis_air_pollution
      - be-air-pollution
      - mlflow
    restart: always
    networks:
      - air-pollution-network
    command: ["celery", "-A", "air_pollution", "worker", "--loglevel=INFO"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat_air_pollution:
    build:
      context: .
      dockerfile: dockerfile.celery
    container_name: celery_beat_air_pollution
    volumes:
      - .:/app
      - ./.env:/app/.env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL_DEV}
      # KAFKA_BROKER: kafka_air_pollution:9092
      PYTHONUNBUFFERED: 1
    depends_on:
      - redis_air_pollution
      - be-air-pollution
      - mlflow
    restart: always
    networks:
      - air-pollution-network
    command: ["celery", "-A", "air_pollution", "beat", "--loglevel=INFO"]

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"  # MQTT
      - "9001:9001"  # websocket nếu cần
    volumes:
      - ./mosquitto/config:/mosquitto/config  # tạo folder mosquitto/config với mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    depends_on:
      - be-air-pollution
    restart: unless-stopped
    networks:
      - air-pollution-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --allowed-hosts "*"
    depends_on:
      - be-air-pollution
    restart: unless-stopped
    networks:
      - air-pollution-network

  mqtt_consumer_air_pollution:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt_consumer_air_pollution
    volumes:
      - .:/app
    entrypoint: ["python", "manage.py", "run_mqtt_consumer"]
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      redis_air_pollution:
        condition: service_healthy
      mysql-air-pollution-db:
        condition: service_healthy
      be-air-pollution:
        condition: service_started
      mosquitto:
        condition: service_started
    restart: always
    env_file:
    - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - air-pollution-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql-data:
  redis_data_file_dev:

networks:
  air-pollution-network:
    driver: bridge