services:
  mysql-air-pollution-db:
    image: mysql:8.0
    container_name: mysql-air-pollution-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DEV_DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - air-pollution-network
    command:
      - --default-authentication-plugin=mysql_native_password
      - --bind-address=0.0.0.0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    #giói hạn logging (json)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  redis_air_pollution:
    image: redis:alpine
    container_name: redis_air_pollution
    ports:
      - "6379:6379"
    networks:
      - air-pollution-network
    volumes:
      - redis_data_file_dev:/var/lib/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

