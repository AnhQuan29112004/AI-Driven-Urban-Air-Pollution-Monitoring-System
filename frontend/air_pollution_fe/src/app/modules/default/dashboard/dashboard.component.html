<div class="w-full h-full justify-center items-center p-8 flex flex-col gap-4">
    <h1 class="text-2xl font-bold">{{response}}</h1>
    
    <!-- Real-time Sensor Data Section -->
    <div class="bg-slate-800 text-green-400 p-6 rounded-xl w-full max-w-lg shadow-xl" *ngIf="sensorData">
        <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            Real-time Sensor Data
        </h2>
        <pre class="text-sm overflow-x-auto">{{ sensorData | json }}</pre>
    </div>

    <!-- Tiêu chuẩn chờ dữ liệu -->
    <div class="text-gray-500 mt-4 animate-pulse" *ngIf="!sensorData">
        ⏳ Đang chờ nhận tín hiệu MQTT từ Backend...
    </div>
</div>
